<head>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--ink:#000;--line:#dcdcdc;--maxw:1180px;--gutter:clamp(1.25rem,4vw,3rem);--f:'Helvetica Neue',Helvetica,Arial,sans-serif}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--f);font-weight:400;font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
h1,h2,h3{font-weight:400}
::selection{background:#000;color:#fff}

.site-head{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--line)}
.head-in{max-width:var(--maxw);margin:0 auto;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:1rem var(--gutter)}
.head-left{justify-self:start}
.brand{justify-self:center;font-size:1.5rem;letter-spacing:.01em;line-height:1}
.head-right{justify-self:end}
.social{display:flex;align-items:center;gap:.85rem}
.social a{color:var(--ink);display:inline-flex;align-items:center}
.social svg{display:block;width:19px;height:19px}
.burger{width:26px;height:20px;position:relative}
.burger span{position:absolute;left:0;right:0;height:1.5px;background:var(--ink);transition:.3s ease}
.burger span:nth-child(1){top:3px}.burger span:nth-child(2){top:10px}.burger span:nth-child(3){top:17px}
body.menu-open .burger span:nth-child(1){transform:translateY(7px) rotate(45deg)}
body.menu-open .burger span:nth-child(2){opacity:0}
body.menu-open .burger span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

.scrim{position:fixed;inset:0;z-index:110;background:rgba(0,0,0,.15);opacity:0;visibility:hidden;transition:.3s ease}
body.menu-open .scrim{opacity:1;visibility:visible}
.panel{position:fixed;top:0;left:0;bottom:0;z-index:120;width:min(82vw,300px);background:#fff;border-right:1px solid var(--line);padding:5rem var(--gutter) 2rem;display:flex;flex-direction:column;gap:1.3rem;transform:translateX(-100%);transition:transform .35s ease}
body.menu-open .panel{transform:translateX(0)}
.panel a{font-size:1.15rem}
.panel a.active{text-decoration:underline;text-underline-offset:4px}
.panel .pclose{position:absolute;top:1.1rem;right:1.2rem;font-size:1.6rem;line-height:1}

.wrap{max-width:var(--maxw);margin:0 auto;padding:clamp(2.2rem,6vw,4.5rem) var(--gutter) clamp(3rem,7vw,6rem)}
.bare{padding:0}

.grid{display:grid;gap:clamp(1.4rem,3vw,2.3rem)}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.item{display:block}
.item .frame{overflow:hidden;background:#f3f3f3;aspect-ratio:4/3}
.item .frame img{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.22,1,.36,1)}
.item:hover .frame img{transform:scale(1.035)}
.cap{margin-top:.6rem;font-size:.95rem}

/* home */
.home-media img{width:100%;height:auto;display:block}

/* detail */
.back{display:inline-block;font-size:.9rem;margin-bottom:clamp(1.2rem,3vw,2rem);border-bottom:1px solid transparent}
.back:hover{border-bottom-color:var(--ink)}
.detail-main{display:block;width:100%;padding:0;margin:0 auto clamp(1.4rem,3vw,2.2rem);cursor:zoom-in;background:#f3f3f3}
.detail-main img{width:100%;height:auto;display:block}
.detail-main.narrow{max-width:80%}
.detail-desc{max-width:64ch;margin-bottom:clamp(2rem,5vw,3.4rem)}
.detail-desc h2{font-size:clamp(1.2rem,2.6vw,1.6rem);margin-bottom:.5rem}
.video-embed{position:relative;width:100%;aspect-ratio:16/9;margin-bottom:clamp(1.4rem,3vw,2.2rem);background:#000}
.video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

/* uniform aligned gallery (rows, no stagger) */
.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(.9rem,2vw,1.5rem)}
.gallery button{display:block;width:100%;padding:0;overflow:hidden;aspect-ratio:4/3;background:#f3f3f3;cursor:zoom-in}
.gallery img{width:100%;height:100%;object-fit:cover;transition:transform .6s cubic-bezier(.22,1,.36,1)}
.gallery button:hover img{transform:scale(1.04)}

/* creative */
.feature{display:grid;grid-template-columns:1fr 1fr;gap:clamp(1.6rem,4vw,3rem);align-items:center;margin-bottom:clamp(2rem,4vw,3rem)}
.feature .frame{overflow:hidden;background:#f3f3f3;aspect-ratio:1/1}
.feature img{width:100%;height:100%;object-fit:cover}
.feature h2{font-size:clamp(1.3rem,3vw,1.9rem);margin-bottom:.7rem}
.feature p{max-width:52ch}
.bordered{border:1px solid var(--ink)}

/* contact */
.contact-wrap{padding-top:clamp(3rem,8vw,6.5rem);padding-bottom:clamp(4.5rem,12vw,9rem)}
.contact-grid{display:grid;grid-template-columns:minmax(0,320px) 1fr;gap:clamp(2rem,8vw,7rem);align-items:start}
.contact-photo img{width:100%;display:block;background:#f3f3f3}
.contact-text{margin-top:clamp(2.5rem,11vw,7rem);max-width:56ch}
.contact-text p{margin-bottom:1.15rem;line-height:1.8}
.contact-text .mail{display:inline-block;margin-top:1rem;border-bottom:1px solid var(--ink);padding-bottom:2px}

.site-foot{border-top:1px solid var(--line)}
.foot-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.6rem;padding:1.5rem var(--gutter);font-size:.85rem}
.foot-in a{border-bottom:1px solid transparent}.foot-in a:hover{border-bottom-color:var(--ink)}
.foot-brand{font-size:1.15rem;letter-spacing:.01em}

.lb{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;padding:3vw;background:rgba(255,255,255,.98)}
.lb.open{display:flex}
.lb img{max-width:90vw;max-height:88vh;object-fit:contain}
.lb .x{position:absolute;top:1rem;right:1.3rem;font-size:2rem;line-height:1}
.lb .nav{position:absolute;top:50%;transform:translateY(-50%);font-size:2.4rem;line-height:1;padding:.4rem .8rem;user-select:none}
.lb .prev{left:.4rem}.lb .next{right:.4rem}

@media (max-width:820px){.g3{grid-template-columns:repeat(2,1fr)}.feature{grid-template-columns:1fr}.gallery{grid-template-columns:repeat(2,1fr)}.contact-grid{grid-template-columns:1fr}.contact-photo{max-width:340px}.contact-text{margin-top:clamp(1.5rem,6vw,3rem)}.detail-main.narrow{max-width:100%}}
@media (max-width:520px){.g2{grid-template-columns:1fr}.brand{font-size:1.3rem}.social{gap:.65rem}}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<script>
(function(){
  var body=document.body,b=document.getElementById('burger'),sc=document.getElementById('scrim'),pc=document.getElementById('pclose');
  function toggle(o){body.classList.toggle('menu-open',o);if(b)b.setAttribute('aria-expanded',String(o));}
  if(b)b.addEventListener('click',function(){toggle(!body.classList.contains('menu-open'));});
  if(sc)sc.addEventListener('click',function(){toggle(false);});
  if(pc)pc.addEventListener('click',function(){toggle(false);});
  document.querySelectorAll('#panel a').forEach(function(a){a.addEventListener('click',function(){toggle(false);});});
  document.addEventListener('keydown',function(e){if(e.key==='Escape')toggle(false);});
  var lb=document.getElementById('lb');
  if(lb){
    var lbi=document.getElementById('lbi');
    var items=[].slice.call(document.querySelectorAll('[data-full]'));
    var fulls=items.map(function(el){return el.getAttribute('data-full');});
    var idx=0;
    function show(i){idx=(i+fulls.length)%fulls.length;lbi.src=fulls[idx];}
    function open(i){show(i);lb.classList.add('open');}
    function close(){lb.classList.remove('open');lbi.src='';}
    items.forEach(function(el,i){el.addEventListener('click',function(e){e.preventDefault();open(i);});});
    var x=lb.querySelector('.x'),pv=lb.querySelector('.prev'),nx=lb.querySelector('.next');
    if(x)x.addEventListener('click',close);
    if(pv)pv.addEventListener('click',function(e){e.stopPropagation();show(idx-1);});
    if(nx)nx.addEventListener('click',function(e){e.stopPropagation();show(idx+1);});
    lb.addEventListener('click',function(e){if(e.target===lb)close();});
    document.addEventListener('keydown',function(e){if(!lb.classList.contains('open'))return;if(e.key==='Escape')close();else if(e.key==='ArrowLeft')show(idx-1);else if(e.key==='ArrowRight')show(idx+1);});
  }
})();
</script>
