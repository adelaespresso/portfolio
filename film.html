<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff; --ink:#151515; --muted:#8a8a8a; --line:#e9e9e9;
  --maxw:1180px; --gutter:clamp(1.25rem,4vw,3rem);
  --f:'Inter',Helvetica,Arial,sans-serif;
}
html{-webkit-text-size-adjust:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--f);font-weight:400;
  font-size:16px;line-height:1.6;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
img{display:block;max-width:100%;height:auto}
a{color:inherit;text-decoration:none}
button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
::selection{background:#151515;color:#fff}

/* header */
.site-head{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.9);
  -webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.head-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;
  gap:1.5rem;padding:1.1rem var(--gutter)}
.brand{font-size:1.5rem;font-weight:500;letter-spacing:.01em;line-height:1}
.brand b{font-weight:500}
.nav{display:flex;align-items:center;gap:1.9rem}
.nav a{font-size:.9rem;color:var(--muted);letter-spacing:.01em;position:relative;padding-bottom:2px;
  transition:color .2s ease}
.nav a:hover{color:var(--ink)}
.nav a.active{color:var(--ink)}
.nav a.active::after{content:"";position:absolute;left:0;right:0;bottom:-2px;height:1px;background:var(--ink)}
.social{display:flex;align-items:center;gap:1rem}
.social a{color:var(--muted);transition:color .2s ease}
.social a:hover{color:var(--ink)}
.social svg{display:block;width:18px;height:18px}
.burger{display:none;width:34px;height:34px;position:relative}
.burger span{position:absolute;left:6px;right:6px;height:1.6px;background:var(--ink);transition:.3s ease}
.burger span:nth-child(1){top:13px}.burger span:nth-child(2){top:20px}
body.menu-open .burger span:nth-child(1){transform:translateY(3.5px) rotate(45deg)}
body.menu-open .burger span:nth-child(2){transform:translateY(-3.5px) rotate(-45deg)}

/* page shell */
.wrap{max-width:var(--maxw);margin:0 auto;padding:clamp(2.5rem,6vw,5rem) var(--gutter) clamp(3rem,7vw,6rem)}
.page-title{font-size:clamp(1.5rem,3.4vw,2.3rem);font-weight:300;letter-spacing:.01em;margin-bottom:.4rem}
.page-intro{color:var(--muted);max-width:60ch;margin-bottom:clamp(2rem,4vw,3.2rem)}

/* thumbnail grid */
.grid{display:grid;gap:clamp(1.4rem,3vw,2.4rem)}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
.g4{grid-template-columns:repeat(4,1fr)}
.item{display:block}
.item .frame{overflow:hidden;background:#f3f3f3;aspect-ratio:4/3}
.item.sq .frame{aspect-ratio:1/1}
.item .frame img{width:100%;height:100%;object-fit:cover;transition:transform .7s cubic-bezier(.22,1,.36,1),opacity .3s ease}
.item:hover .frame img{transform:scale(1.035)}
.cap{margin-top:.7rem;font-size:.95rem;letter-spacing:.01em}
.cap .k{color:var(--muted);font-size:.78rem}

/* home */
.home-hero{display:grid;gap:clamp(1.4rem,3vw,2.2rem)}
.home-hero .lead{max-width:60ch}
.home-hero h1{font-size:clamp(1.8rem,4.6vw,3rem);font-weight:300;line-height:1.12;letter-spacing:.005em;margin-bottom:1rem}
.home-hero h1 em{font-style:italic}
.home-hero .sub{color:var(--muted);font-size:1.05rem;margin-bottom:1.6rem}
.home-media{display:grid;grid-template-columns:1fr 1fr;gap:clamp(1rem,2.5vw,1.8rem);margin-top:.5rem}
.home-media .frame{overflow:hidden;background:#f3f3f3;aspect-ratio:3/2}
.home-media img{width:100%;height:100%;object-fit:cover}

/* creative */
.feature{display:grid;grid-template-columns:1fr 1fr;gap:clamp(1.6rem,4vw,3rem);align-items:center;
  margin-bottom:clamp(2rem,4vw,3rem)}
.feature .frame{overflow:hidden;background:#f3f3f3;aspect-ratio:1/1}
.feature img{width:100%;height:100%;object-fit:cover}
.feature h2{font-size:clamp(1.4rem,3vw,2rem);font-weight:300;margin-bottom:.5rem}
.feature .k{color:var(--muted);font-size:.82rem;letter-spacing:.04em;text-transform:uppercase;margin-bottom:1rem;display:block}
.feature p{color:#333;max-width:52ch}

/* about / contact */
.about{display:grid;grid-template-columns:.8fr 1.2fr;gap:clamp(1.6rem,5vw,4rem);align-items:start}
.about .frame{overflow:hidden;background:#f3f3f3}
.about img{width:100%;object-fit:cover}
.about h1{font-size:clamp(1.6rem,3.4vw,2.3rem);font-weight:300;margin-bottom:1.2rem}
.about p{color:#333;margin-bottom:1rem;max-width:60ch}
.about .mail{display:inline-block;margin-top:.6rem;border-bottom:1px solid var(--ink);padding-bottom:2px}
.about .links{display:flex;gap:1.4rem;margin-top:1.6rem}
.about .links a{font-size:.85rem;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
.about .links a:hover{color:var(--ink)}

/* footer */
.site-foot{border-top:1px solid var(--line);margin-top:2rem}
.foot-in{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:.6rem;padding:1.6rem var(--gutter);color:var(--muted);font-size:.85rem}
.foot-in a{color:var(--muted)}.foot-in a:hover{color:var(--ink)}

/* lightbox */
.lb{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;
  padding:4vw;background:rgba(255,255,255,.97)}
.lb.open{display:flex}
.lb img{max-width:92vw;max-height:86vh;object-fit:contain}
.lb .x{position:absolute;top:1.2rem;right:1.6rem;font-size:2rem;line-height:1;color:var(--ink);opacity:.6}
.lb .x:hover{opacity:1}

@media (max-width:820px){
  .g3,.g4{grid-template-columns:repeat(2,1fr)}
  .feature,.about{grid-template-columns:1fr}
  .about .frame{max-width:420px}
  .home-media{grid-template-columns:1fr}
}
@media (max-width:640px){
  .nav{position:fixed;inset:0 0 0 auto;width:min(76vw,300px);flex-direction:column;
    align-items:flex-start;justify-content:center;gap:1.5rem;padding:2rem var(--gutter);
    background:#fff;border-left:1px solid var(--line);transform:translateX(100%);transition:transform .35s ease}
  body.menu-open .nav{transform:translateX(0)}
  .nav a{font-size:1.1rem}
  .burger{display:block;z-index:101}
  .social{display:none}
  .g2{grid-template-columns:1fr}
}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<script>
(function(){
  var b=document.getElementById('burger');
  if(b){b.addEventListener('click',function(){document.body.classList.toggle('menu-open');});}
  document.querySelectorAll('#nav a').forEach(function(a){a.addEventListener('click',function(){document.body.classList.remove('menu-open');});});
  // lightbox
  var lb=document.getElementById('lb'), lbi=document.getElementById('lbi');
  if(lb){
    document.querySelectorAll('[data-full]').forEach(function(el){
      el.addEventListener('click',function(e){e.preventDefault();lbi.src=el.getAttribute('data-full');lb.classList.add('open');});
    });
    lb.addEventListener('click',function(){lb.classList.remove('open');lbi.src='';});
    document.addEventListener('keydown',function(e){if(e.key==='Escape'){lb.classList.remove('open');lbi.src='';}});
  }
  var y=document.getElementById('yr'); if(y)y.textContent=new Date().getFullYear();
})();
</script>
